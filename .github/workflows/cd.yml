name: Users MS CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: Projet-technique-Altair/altair-ci/.github/workflows/microservices-cd.yml@main
    with:
      gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
      region: ${{ vars.GCP_REGION }}
      artifact_registry_host: ${{ vars.GCP_ARTIFACT_REGISTRY_HOST }}
      artifact_registry_repo: ${{ vars.GCP_ARTIFACT_REPO }}
      workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
      deploy_service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      service_name: users-ms
      image_name: users-ms

      workdir: .
      dockerfile: Dockerfile
      platform: linux/amd64

      # Store runtime config per repository.
      # For this service, that will include DATABASE_URL and the Keycloak admin settings.
      cloud_run_service_account: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
      cloud_run_env_vars: ${{ vars.CLOUD_RUN_ENV_VARS }}
      cloud_run_secrets: ${{ vars.CLOUD_RUN_SECRETS }}
      extra_deploy_args: ${{ vars.CLOUD_RUN_EXTRA_ARGS }}
